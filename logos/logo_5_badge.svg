<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Badge: Hexagonal orange badge with black triskelion -->
  <defs>
    <linearGradient id="badge-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F07020"/>
      <stop offset="100%" stop-color="#C84E08"/>
    </linearGradient>
  </defs>
  <!-- Hexagon background -->
  <polygon points="100,8 178,46 178,154 100,192 22,154 22,46" fill="url(#badge-grad)"/>
  <polygon points="100,8 178,46 178,154 100,192 22,154 22,46" stroke="#1a1a1a" stroke-width="4" fill="none"/>
  <!-- Inner black circle -->
  <circle cx="100" cy="100" r="62" fill="#1a1a1a"/>
  <!-- Orange triskelion inside -->
  <g stroke="#E8600A" stroke-width="9" stroke-linecap="round" fill="none">
    <path d="M 100,100 C 98,84 108,70 102,56 C 96,42 78,38 72,50 C 66,62 74,68 80,64"/>
    <path d="M 100,100 C 98,84 108,70 102,56 C 96,42 78,38 72,50 C 66,62 74,68 80,64" transform="rotate(120 100 100)"/>
    <path d="M 100,100 C 98,84 108,70 102,56 C 96,42 78,38 72,50 C 66,62 74,68 80,64" transform="rotate(240 100 100)"/>
  </g>
  <circle cx="100" cy="100" r="5" fill="#E8600A"/>
  <!-- Thin inner hex border accent -->
  <polygon points="100,18 170,52 170,148 100,182 30,148 30,52" stroke="#E8600A" stroke-width="1" fill="none" opacity="0.4"/>
</svg>
