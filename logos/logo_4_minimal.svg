<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Minimal: Thin elegant orange triskelion, no background -->
  <g stroke="#E8600A" stroke-width="5" stroke-linecap="round" fill="none">
    <!-- Outer ring -->
    <circle cx="100" cy="100" r="88" stroke-width="2" opacity="0.3"/>
    <!-- Triskelion arms - longer, more elegant spirals -->
    <path d="M 100,100 C 98,80 110,62 102,42 C 94,22 68,18 58,36 C 48,54 58,68 72,64 C 80,62 82,54 78,48"/>
    <path d="M 100,100 C 98,80 110,62 102,42 C 94,22 68,18 58,36 C 48,54 58,68 72,64 C 80,62 82,54 78,48" transform="rotate(120 100 100)"/>
    <path d="M 100,100 C 98,80 110,62 102,42 C 94,22 68,18 58,36 C 48,54 58,68 72,64 C 80,62 82,54 78,48" transform="rotate(240 100 100)"/>
  </g>
  <!-- Small center dot -->
  <circle cx="100" cy="100" r="4" fill="#E8600A"/>
</svg>
